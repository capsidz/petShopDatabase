services:
  master:
    image: postgres:17
    container_name: pg_master
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: testdb
    ports:
      - "5436:5432"
    volumes:
      - ./master_data:/var/lib/postgresql/data
    command: >
      postgres 
      -c wal_level=replica
      -c max_wal_senders=10
      -c max_replication_slots=10
      -c wal_keep_size=1GB

  replica1:
    image: postgres:17
    container_name: pg_replica1
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5437:5432"
    volumes:
      - ./replica1_data:/var/lib/postgresql/data
    command: >
      postgres 
      -c hot_standby=on

  replica2:
    image: postgres:17
    container_name: pg_replica2
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5438:5432"
    volumes:
      - ./replica2_data:/var/lib/postgresql/data
    command: >
      postgres 
      -c hot_standby=on